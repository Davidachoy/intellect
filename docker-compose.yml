services:
  api:
    build:
      context: ./packages/api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./packages/api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: ./packages/web
    ports:
      - "5173:5173"
    env_file:
      - .env
    volumes:
      - ./packages/web:/app
      - /app/node_modules
    command: pnpm dev --host 0.0.0.0
